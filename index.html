<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <title>UserForm</title>
</head>
<body>
    <div class="mainSection">
        <div class="leftSection">
            <div class="emptyBoxAboveHeader"></div>
            <div class="header">
                <img src="./icon.png">
                <div class="title">Odin</div>
            </div>
        </div>
        <div class="rightSection">
            <div class="comments">
                <p>This is the first Front-End userpage made by HKS, Peppa-Pig-03</p>
                <p>Sign up <span>now</span></p>
            </div>
            <div class="loginbox">
                <div class="title">Let's do this!</div>
                <div class="loginrow">
                    <form>
                        <label for="name">NAME<span>*</span></label>
                        <input type="text" id="name" placeholder="Jane Doe" name="name" required>
                    </form>
                    <form>
                        <label for="gender">GENDER<span>*</span></label>
                        <select name="gender" id="gender">
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                            <option value="trans" selected>Rather Not Disclose</option>
                        </select>
                    </form>
                </div>
                <div class="loginrow">
                    <form>
                        <label for="email">EMAIL<span>*</span></label>
                        <input type="email" id="email" placeholder="Jane.Doe@example.com" name="email" required>
                    </form>
                    <form>
                        <label for="phoneNumber">PHONE NUMBER<span>*</span></label>
                        <input type="number" id=" phoneNumber" placeholder="0123456789" name="phoneNumber" required minlength="10" maxlength="10">
                    </form>
                </div>
                <div class="loginrow">
                    <form>
                        <label for="password">PASSWORD<span>*</span></label>
                        <input type="password" id="password" name="password" required>
                    </form>
                    <form>
                        <label for="confirmPassword">CONFIRM PASSWORD<span>*</span></label>
                        <input type="password" id="confirmPassword" name="confirmPassword" required>
                    </form>
                </div>
            </div>
            <div class="accountCreation">
                <button type="submit">Create Account</button>
                <p> Already have an account? <span>Log in</span></p>
            </div>
        </div>
    </div>
</body>
</html>
